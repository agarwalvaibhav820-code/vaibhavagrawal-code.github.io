<!DOCTYPE html>
<html>
<head>
<title>Feedback</title>
<script src="script.js"></script>

<style>

body{
font-family: Arial;
background: linear-gradient(to right,#f7971e,#ffd200);
}

.box{
width:350px;
margin:auto;
margin-top:120px;
background:white;
padding:25px;
text-align:center;
border-radius:10px;
box-shadow:0 0 10px gray;
}

textarea{
width:90%;
padding:10px;
margin:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Feedback Form</h2>

<form onsubmit="return feedbackSubmit()">

<p>Rate our service</p>

<label><input type="radio" name="rate"> Excellent</label><br>
<label><input type="radio" name="rate"> Good</label><br>
<label><input type="radio" name="rate"> Average</label><br>
<label><input type="radio" name="rate"> Poor</label>

<textarea placeholder="Write your feedback"></textarea>

<br>

<button type="submit">Submit Feedback</button>

</form>

</div>

</body>
</html>
